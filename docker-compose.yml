version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT ONLY
#
# In production this app uses:
#   • Azure SQL Database  — set ConnectionStrings__DefaultConnection to an
#                           Azure SQL connection string with Managed Identity
#                           or a SQL authentication string.
#   • Azure Blob Storage  — set AzureStorage__AccountUri to your storage
#                           account URI (Managed Identity) or supply a
#                           connection string via AzureStorage__ConnectionString.
#
# For local development a SQL Server 2022 container is started automatically.
# Blob storage falls back to the local filesystem when neither AccountUri nor
# ConnectionString is provided.
# ─────────────────────────────────────────────────────────────────────────────

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Local SQL Server (dev only). Replace with Azure SQL string for staging/prod.
      - ConnectionStrings__DefaultConnection=Server=db;Database=JobApplicationSiteDb;User Id=sa;Password=${SQL_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True
      - AzureAd__TenantId=${AZURE_TENANT_ID}
      - AzureAd__ClientId=${AZURE_CLIENT_ID}
      - AzureAd__Domain=MngEnvMCAP003733.onmicrosoft.com
      # Azure Blob Storage — set AccountUri for Managed Identity (DefaultAzureCredential)
      - AzureStorage__AccountUri=${AZURE_STORAGE_ACCOUNT_URI}
      - AzureDocumentIntelligence__Endpoint=${AZURE_DOC_INTELLIGENCE_ENDPOINT}
    depends_on:
      - db
    restart: unless-stopped

  # Local SQL Server — DEVELOPMENT ONLY.
  # In production, point DefaultConnection at an Azure SQL Database.
  # Using Azure SQL Edge for ARM64 compatibility.
  db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_PASSWORD:-YourStrong!Passw0rd}
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql

volumes:
  sqldata:

